[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm ci --prefix backend",
  "npm ci --prefix frontend"
]

[phases.build]
cmds = [
  "npm run build --prefix frontend",
  "mkdir -p backend/public",
  "cp -r frontend/dist/. backend/public/",
  "DATABASE_URL=postgresql://placeholder:placeholder@localhost/placeholder npm run db:generate --prefix backend"
]

[start]
cmd = "cd backend && npx prisma db push && node src/index.js"

[variables]
NODE_ENV = "production"
