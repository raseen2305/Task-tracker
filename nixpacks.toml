[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "cd backend && npm ci",
  "cd frontend && npm ci"
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
  "cd backend && DATABASE_URL=postgresql://placeholder:placeholder@localhost/placeholder npx prisma generate"
]

[start]
cmd = "cd backend && npx prisma db push && node src/index.js"

[variables]
NODE_ENV = "production"
